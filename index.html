<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Story Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌈 Silly Story Generator 🌈</h1>

        <p class="subtitle">
            Enter your name and generate a magical story!
        </p>

        <div class="input-group">
            <label for="customname">Your Name:</label>
            <input
                type="text"
                id="customname"
                placeholder="Enter your name"
            >
        </div>

        <button class="randomize">
            ✨ Generate Story ✨
        </button>

        <div class="story-box">
            <p class="story">
                Your silly story will appear here...
            </p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
